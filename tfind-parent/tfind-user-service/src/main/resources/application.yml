server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:data/tfind_user.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  redis:
    host: localhost
    port: 6379

folkmq:
  server-url: folkmq://127.0.0.1:18081
  client-name: user-service

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tfind.user.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: tfind-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

grpc:
  server:
    port: 9091
  client:
    toilet-service:
      address: 'static://127.0.0.1:9092'
