<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>修改密码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 28px;
            font-size: 22px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: #667eea; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-submit:hover { opacity: 0.9; }
        .msg {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .msg.success { background: #f0fff4; color: #38a169; border: 1px solid #c6f6d5; }
        .msg.error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>修改密码</h2>
    <div id="msg" class="msg"></div>
    <form id="changePwdForm">
        <div class="form-group">
            <label>原密码</label>
            <input type="password" id="oldPassword" name="oldPassword" required="required"/>
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" id="newPassword" name="newPassword" required="required" minlength="6"/>
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required="required" minlength="6"/>
        </div>
        <button type="submit" class="btn-submit">确认修改</button>
    </form>
    <a class="back-link" href="/admin">返回管理后台</a>
</div>
<script>
    document.getElementById('changePwdForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var oldPwd = document.getElementById('oldPassword').value;
        var newPwd = document.getElementById('newPassword').value;
        var confirmPwd = document.getElementById('confirmPassword').value;
        var msgEl = document.getElementById('msg');
        if (newPwd !== confirmPwd) {
            msgEl.className = 'msg error';
            msgEl.style.display = 'block';
            msgEl.textContent = '两次输入的新密码不一致';
            return;
        }
        var formData = new FormData();
        formData.append('oldPassword', oldPwd);
        formData.append('newPassword', newPwd);
        fetch('/change-password', {
            method: 'POST',
            body: formData
        }).then(function(res) { return res.json(); })
          .then(function(data) {
              if (data.success) {
                  msgEl.className = 'msg success';
                  msgEl.style.display = 'block';
                  msgEl.textContent = '密码修改成功';
                  document.getElementById('changePwdForm').reset();
              } else {
                  msgEl.className = 'msg error';
                  msgEl.style.display = 'block';
                  msgEl.textContent = '修改密码失败，请检查原密码是否正确';
              }
          })
          .catch(function() {
              msgEl.className = 'msg error';
              msgEl.style.display = 'block';
              msgEl.textContent = '网络错误，请稍后重试';
          });
    });
</script>
</body>
</html>
