<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>TFind</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            padding-bottom: 60px;
        }
        .header {
            background: #4A90D9;
            color: #fff;
            padding: 20px 16px 30px;
            text-align: center;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .container { padding: 12px; }
        .section {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .user-header {
            display: flex;
            align-items: center;
            padding: 12px 0;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #4A90D9;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }
        .user-detail { margin-left: 12px; }
        .user-name { font-size: 16px; font-weight: 600; }
        .user-role { font-size: 12px; color: #999; margin-top: 2px; }
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 16px 0 8px;
            border-top: 1px solid #eee;
            margin-top: 12px;
        }
        .stat-item { text-align: center; }
        .stat-num { font-size: 20px; font-weight: 700; color: #4A90D9; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 15px;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-arrow { color: #ccc; }
        .menu-item a {
            text-decoration: none;
            color: #333;
            display: block;
            width: 100%;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            height: 56px;
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #999;
            font-size: 10px;
        }
        .nav-item.active { color: #4A90D9; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }
        .quick-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .quick-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }
        .quick-info { flex: 1; }
        .quick-title { font-size: 15px; font-weight: 500; }
        .quick-desc { font-size: 12px; color: #999; margin-top: 2px; }
        .quick-count { font-size: 24px; font-weight: 700; color: #4A90D9; }
    </style>
</head>
<body>
<div class="header">
    <h1>TFind 管理端</h1>
</div>

<div class="container">
    <div class="section">
        <div class="user-header">
            <div class="user-avatar" th:text="${userId != null ? userId.substring(0,1) : 'A'}"></div>
            <div class="user-detail">
                <div class="user-name" th:text="${userId}">Admin</div>
                <div class="user-role">管理员</div>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" th:text="${userCount}">0</div>
                <div class="stat-label">用户数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" th:text="${toiletCount}">0</div>
                <div class="stat-label">厕所数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" th:text="${pendingCount}">0</div>
                <div class="stat-label">待审核</div>
            </div>
        </div>
    </div>

    <div class="section">
        <a th:href="@{/admin/users}" class="menu-item">
            <span>用户管理</span>
            <span class="menu-arrow">></span>
        </a>
        <a th:href="@{/admin/toilets}" class="menu-item">
            <span>厕所管理</span>
            <span class="menu-arrow">></span>
        </a>
        <a th:href="@{/admin/toilets/pending}" class="menu-item">
            <span>审核厕所</span>
            <span class="menu-arrow" th:if="${pendingCount > 0}" th:text="'待' + ${pendingCount}"></span>
            <span class="menu-arrow" th:unless="${pendingCount > 0}">></span>
        </a>
        <a th:href="@{/admin/deleted}" class="menu-item">
            <span>删除管理</span>
            <span class="menu-arrow">></span>
        </a>
        <a th:href="@{/change-password}" class="menu-item">
            <span>修改密码</span>
            <span class="menu-arrow">></span>
        </a>
    </div>
</div>

<div class="bottom-nav">
    <a th:href="@{/admin}" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span>首页</span>
    </a>
    <a th:href="@{/admin/users}" class="nav-item">
        <span class="nav-icon">👥</span>
        <span>用户</span>
    </a>
    <a th:href="@{/admin/toilets}" class="nav-item">
        <span class="nav-icon">🚻</span>
        <span>厕所</span>
    </a>
    <a th:href="@{/logout}" class="nav-item">
        <span class="nav-icon">🚪</span>
        <span>退出</span>
    </a>
</div>
</body>
</html>
