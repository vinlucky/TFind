<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>删除管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; padding-bottom: 60px; }
        .header { background: #4A90D9; color: #fff; padding: 16px; display: flex; align-items: center; }
        .header a { color: #fff; text-decoration: none; font-size: 16px; margin-right: 12px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .container { padding: 12px; }
        .section-title { font-size: 16px; font-weight: 600; margin: 16px 0 8px; padding-left: 4px; }
        .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
        .card .name { font-size: 16px; font-weight: 600; }
        .card .info { font-size: 13px; color: #666; margin-top: 4px; }
        .card .actions { margin-top: 10px; display: flex; gap: 8px; }
        .card .actions button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; color: #fff; }
        .btn-restore { background: #2e7d32; }
        .btn-physical { background: #ff4757; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #eee; display: flex; height: 56px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #999; font-size: 10px; }
        .nav-item.active { color: #4A90D9; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }
    </style>
</head>
<body>
<div class="header">
    <a th:href="@{/admin}">&lt;</a>
    <h1>删除管理</h1>
</div>
<div class="container">
    <div class="section-title">已删除用户</div>
    <div class="card" th:each="user : ${deletedUsers}">
        <div class="name" th:text="${user.userId}">User</div>
        <div class="info" th:if="${user.deltime}" th:text="'删除时间: ' + ${user.deltime}"></div>
        <div class="actions">
            <button class="btn-restore" th:onclick="'restoreUser(\'' + ${user.userId} + '\')'">恢复</button>
            <button class="btn-physical" th:onclick="'physicalDeleteUser(\'' + ${user.userId} + '\')'">物理删除</button>
        </div>
    </div>
    <div class="card" th:if="${deletedUsers == null || deletedUsers.size() == 0}" style="text-align:center;padding:20px;color:#999;">
        暂无已删除用户
    </div>

    <div class="section-title">已删除厕所</div>
    <div class="card" th:each="toilet : ${deletedToilets}">
        <div class="name" th:text="${toilet.name}">Toilet</div>
        <div class="info" th:if="${toilet.deltime}" th:text="'删除时间: ' + ${toilet.deltime}"></div>
        <div class="actions">
            <button class="btn-restore" th:onclick="'restoreToilet(\'' + ${toilet.id} + '\')'">恢复</button>
            <button class="btn-physical" th:onclick="'physicalDeleteToilet(\'' + ${toilet.id} + '\')'">物理删除</button>
        </div>
    </div>
    <div class="card" th:if="${deletedToilets == null || deletedToilets.size() == 0}" style="text-align:center;padding:20px;color:#999;">
        暂无已删除厕所
    </div>
</div>
<div class="bottom-nav">
    <a th:href="@{/admin}" class="nav-item active"><span class="nav-icon">🏠</span><span>首页</span></a>
    <a th:href="@{/admin/users}" class="nav-item"><span class="nav-icon">👥</span><span>用户</span></a>
    <a th:href="@{/admin/toilets}" class="nav-item"><span class="nav-icon">🚻</span><span>厕所</span></a>
    <a th:href="@{/logout}" class="nav-item"><span class="nav-icon">🚪</span><span>退出</span></a>
</div>
<script th:inline="javascript">
    function restoreUser(userId) {
        fetch('/admin/user/' + userId + '/restore', { method: 'POST' })
            .then(res => res.json())
            .then(data => { if (data.success) location.reload(); });
    }
    function physicalDeleteUser(userId) {
        if (!confirm('确定物理删除用户 ' + userId + '？不可恢复！')) return;
        fetch('/admin/user/' + userId + '/physical-delete', { method: 'POST' })
            .then(res => res.json())
            .then(data => { if (data.success) location.reload(); });
    }
    function restoreToilet(id) {
        fetch('/admin/toilet/' + id + '/restore', { method: 'POST' })
            .then(res => res.json())
            .then(data => { if (data.success) location.reload(); });
    }
    function physicalDeleteToilet(id) {
        if (!confirm('确定物理删除该厕所？不可恢复！')) return;
        fetch('/admin/toilet/' + id + '/physical-delete', { method: 'POST' })
            .then(res => res.json())
            .then(data => { if (data.success) location.reload(); });
    }
</script>
</body>
</html>
