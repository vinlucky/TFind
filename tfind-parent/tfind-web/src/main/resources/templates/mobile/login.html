<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>TFind 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4A90D9 0%, #667eea 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 32px 24px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .login-card h1 {
            text-align: center;
            color: #333;
            margin-bottom: 6px;
            font-size: 24px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 28px;
            font-size: 13px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus { border-color: #4A90D9; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4A90D9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-msg {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>TFind</h1>
    <p class="subtitle">管理端登录</p>
    <div class="error-msg" th:if="${param.error}">用户名或密码错误</div>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>用户ID</label>
            <input type="text" name="userId" placeholder="请输入用户ID" required="required"/>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required="required"/>
        </div>
        <button type="submit" class="btn-login">登 录</button>
    </form>
</div>
</body>
</html>
