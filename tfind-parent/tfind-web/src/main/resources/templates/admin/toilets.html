<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TFind 管理端 - 厕所管理</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>TFind</h2>
            <span>管理端</span>
        </div>
        <ul class="nav-menu">
            <li><a th:href="@{/admin}">仪表盘</a></li>
            <li><a th:href="@{/admin/users}">用户管理</a></li>
            <li class="active"><a th:href="@{/admin/toilets}">厕所管理</a></li>
            <li><a th:href="@{/admin/toilets/pending}">审核管理</a></li>
            <li><a th:href="@{/admin/deleted}">删除管理</a></li>
        </ul>
        <div class="sidebar-footer">
            <a th:href="@{/logout}">退出登录</a>
        </div>
    </nav>
    <main class="content">
        <div class="page-header">
            <h1>厕所管理</h1>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                <tr>
                    <th>名称</th>
                    <th>位置</th>
                    <th>评分</th>
                    <th>状态</th>
                    <th>审核人</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="toilet : ${toilets}">
                    <td th:text="${toilet.name}">名称</td>
                    <td th:text="${toilet.address}">地址</td>
                    <td th:text="${toilet.score != null ? #numbers.formatDecimal(toilet.score, 1, 1) : '-'}">0.0</td>
                    <td>
                        <span class="badge badge-pending" th:if="${toilet.status == 'pending'}">待审核</span>
                        <span class="badge badge-active" th:if="${toilet.status == 'approved'}">已通过</span>
                        <span class="badge badge-rejected" th:if="${toilet.status == 'rejected'}">已拒绝</span>
                    </td>
                    <td>
                        <span th:text="${toilet.reviewer}" th:if="${toilet.reviewer != null}">-</span>
                        <span class="text-muted" th:unless="${toilet.reviewer != null}">-</span>
                    </td>
                    <td class="action-cell">
                        <button class="btn btn-sm btn-warning"
                                th:if="${toilet.status == 'pending'}"
                                th:attr="onclick='approveToilet(\'' + ${toilet.id} + '\')'">通过</button>
                        <button class="btn btn-sm btn-reject"
                                th:if="${toilet.status == 'pending'}"
                                th:attr="onclick='rejectToilet(\'' + ${toilet.id} + '\')'">拒绝</button>
                        <button class="btn btn-sm btn-danger"
                                th:attr="onclick='deleteToilet(\'' + ${toilet.id} + '\')'">删除</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(toilets)}">
                    <td colspan="6" class="empty-row">暂无厕所数据</td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
