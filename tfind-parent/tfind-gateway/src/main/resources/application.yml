server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
        - id: toilet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/toilet/**,/api/review/**,/api/review-update/**,/api/report/**,/api/profile/**,/uploads/**
  redis:
    host: localhost
    port: 6379
  security:
    oauth2:
      client:
        registration:
          tfind:
            client-id: tfind-client
            client-secret: tfind-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read
              - write
        provider:
          tfind:
            authorization-uri: http://localhost:8081/oauth/authorize
            token-uri: http://localhost:8081/oauth/token
            user-info-uri: http://localhost:8081/api/user/info
            user-name-attribute: userId

jwt:
  secret: tfind-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
